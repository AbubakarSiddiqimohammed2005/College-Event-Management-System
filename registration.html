<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registration - College Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background:#f5f7fb;
}

.navbar{
    background: linear-gradient(90deg,#0d6efd,#0a58ca);
}

.section-title{
    text-align:center;
    font-weight:700;
    margin:40px 0;
}

.form-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
<div class="container">

<a class="navbar-brand fw-bold">🎓 College Events</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
<li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
<li class="nav-item"><a class="nav-link active" href="registration.html">Registration</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>

</div>
</div>
</nav>

<!-- TITLE -->
<h2 class="section-title">Event Registration Form</h2>

<!-- SUCCESS ALERT -->
<div class="container">
<div id="successMsg" class="alert alert-success d-none">
🎉 Registration Successful! You are registered for the event.
</div>
</div>

<!-- FORM -->
<div class="container">
<div class="form-box">

<form onsubmit="return showMessage()">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Branch</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Select Event</label>
<select class="form-select" required>
<option value="">-- Choose Event --</option>
<option>Technical Quiz</option>
<option>Hackathon</option>
<option>Poster Presentation</option>
<option>Coding Contest</option>
<option>Project Expo</option>
<option>Cultural Fest</option>
</select>
</div>

<button type="submit" class="btn btn-success w-100">
Register Now
</button>

</form>

</div>
</div>

<!-- FOOTER -->
<footer>
© 2026 College Event Management System
</footer>

<!-- SCRIPT -->
<script>
function showMessage(){
document.getElementById("successMsg").classList.remove("d-none");
window.scrollTo(0,0);
return false;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
